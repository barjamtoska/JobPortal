{% load static %}
<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hyrje – JobPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/login.css' %}"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="{% url 'index' %}" class="nav-logo">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M8 3l5 5-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      JobPortal
    </a>
    <div class="nav-spacer"></div>
    <a href="{% url 'job_list' %}" class="nav-back-link">← Kthehu tek Punët</a>
  </div>
</nav>

<div class="auth-wrap">

  <!-- LEFT -->
  <div class="auth-left">
    <div class="panel-inner">
      <h1 class="panel-title">Gjej karrierën<br>e <em>duhur</em> tani.</h1>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-form-wrap">

      {% if error %}
      <div style="background:#FEE2E2;border-radius:9px;padding:12px 16px;color:#991B1B;font-size:.85rem;margin-bottom:16px;">
        {{ error }}
      </div>
      {% endif %}

      <div class="auth-tabs">
        <button class="auth-tab {% if tab == 'login' %}active{% endif %}" id="tabLogin" onclick="switchTab('login')">Hyrje</button>
        <button class="auth-tab {% if tab == 'register' %}active{% endif %}" id="tabRegister" onclick="switchTab('register')">Regjistrim</button>
      </div>

      <!-- HYRJE -->
      <div id="formLogin" class="auth-form {% if tab != 'login' %}hidden{% endif %}">
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="action" value="login"/>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" placeholder="emri@email.com" required/>
          </div>
          <div class="form-group" style="margin-top:14px;">
            <label class="form-label">Fjalëkalimi</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required/>
          </div>
          <button type="submit" class="btn-submit" style="margin-top:20px;">
            Hyr në Llogari →
          </button>
        </form>
        <p class="form-footer-note" style="margin-top:16px;">Nuk ke llogari?
          <button class="link-btn" onclick="switchTab('register')">Regjistrohu falas →</button>
        </p>
      </div>

      <!-- REGJISTRIM -->
      <div id="formRegister" class="auth-form {% if tab != 'register' %}hidden{% endif %}">

        <div class="user-type-row">
          <button class="utype-btn active" id="reg-type-candidate" onclick="setRegType('candidate', this)">
            <span class="utype-icon">👤</span> Kandidat
          </button>
          <button class="utype-btn" id="reg-type-employer" onclick="setRegType('employer', this)">
            <span class="utype-icon">🏢</span> Punëdhënës
          </button>
        </div>

        <!-- KANDIDAT -->
        <div id="reg-candidate-fields">
          <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="register_candidate"/>
            <div class="reg-section-label">👤 Informacion Personal</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
              <div class="form-group">
                <label class="form-label">Emri *</label>
                <input type="text" name="first_name" class="form-input" placeholder="Emri" required/>
              </div>
              <div class="form-group">
                <label class="form-label">Mbiemri *</label>
                <input type="text" name="last_name" class="form-input" placeholder="Mbiemri" required/>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-input" placeholder="emri@email.com" required/>
            </div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Titulli Profesional *</label>
              <input type="text" name="title" class="form-input" placeholder="p.sh. Software Developer"/>
            </div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Fjalëkalimi *</label>
              <input type="password" name="password" class="form-input" placeholder="Minimum 8 karaktere" required/>
            </div>
            <label class="check-label" style="margin-bottom:14px;">
              <input type="checkbox" required class="check-input"/>
              Pranoj <a href="{% url 'terms' %}" style="color: #1A7A4A; font-weight: bold;">Kushtet e Shërbimit</a>
            </label>
            <button type="submit" class="btn-submit">Krijo Llogari Falas →</button>
          </form>
        </div>

        <!-- PUNËDHËNËS -->
        <div id="reg-employer-fields" class="hidden">
          <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="register_employer"/>
            <div class="reg-section-label">🏢 Informacion i Kompanisë</div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Emri i Kompanisë *</label>
              <input type="text" name="company_name" class="form-input" placeholder="Emri ligjor" required/>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
              <div class="form-group">
                <label class="form-label">Industria *</label>
                <select name="industry" class="form-input">
                  <option value="">Zgjidh...</option>
                  <option>Teknologji</option>
                  <option>Financa</option>
                  <option>Shëndetësi</option>
                  <option>Ndërtim</option>
                  <option>Tregti</option>
                  <option>Arsim</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Nr. Punonjësish *</label>
                <select name="company_size" class="form-input">
                  <option value="">Zgjidh...</option>
                  <option>1–10</option>
                  <option>11–50</option>
                  <option>51–200</option>
                  <option>201–500</option>
                  <option>500+</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Email Korporative *</label>
              <input type="email" name="email" class="form-input" placeholder="hr@kompania.com" required/>
            </div>
            <div class="form-group" style="margin-bottom:14px;">
              <label class="form-label">Fjalëkalimi *</label>
              <input type="password" name="password" class="form-input" placeholder="Minimum 8 karaktere" required/>
            </div>
            <label class="check-label" style="margin-bottom:14px;">
              <input type="checkbox" required class="check-input"/>
              Pranoj <a href="{% url 'terms' %}" style="color: #1A7A4A; font-weight: bold;">Kushtet e Shërbimit</a>
            </label>
            <button type="submit" class="btn-submit">Krijo Llogari Falas →</button>
          </form>
        </div>

        <p class="form-footer-note" style="margin-top:16px;">Ke llogari?
          <button class="link-btn" onclick="switchTab('login')">Hyr tani →</button>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="{% static 'js/login.js' %}" defer></script>
</body>
</html>
